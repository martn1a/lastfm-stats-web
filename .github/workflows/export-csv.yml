name: Export Last.fm CSVs
on:
  schedule:
    - cron: '0 2 * * 1'   # Montag 2:00 UTC
    - cron: '0 2 * * 4'   # Donnerstag 2:00 UTC
  workflow_dispatch:
jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: 📦 Install Dependencies
        run: npm install --legacy-peer-deps
      - name: 🎭 Install Playwright
        run: npx playwright install --with-deps chromium
      - name: 🏗️ Build Angular App
        run: npm run build lastfm-stats
      - name: 🚀 Start Dev Server (Background)
        run: |
          npm run ng serve lastfm-stats -- --port 4200 &
          timeout 60 bash -c 'until curl -s http://localhost:4200 > /dev/null; do sleep 1; done'
      - name: 🎵 Export CSVs
        env:
          LASTFM_USERNAME: ${{ secrets.LASTFM_USERNAME }}
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
        run: |
          mkdir -p exports
          node scripts/export-csv.js
      - name: 📤 Push CSVs to SpotifyRandom Repo
        env:
          GITHUB_TOKEN: ${{ github.token }}
          TARGET_REPO: martn1a/SpotifyRandom
        run: |
          git config --global user.name "Last.fm CSV Export Bot"
          git config --global user.email "bot@github.com"
          mkdir -p /tmp/target-repo
          cd /tmp/target-repo
          git clone https://x-access-token:${GITHUB_TOKEN}@github.com/${TARGET_REPO}.git .
          cp $GITHUB_WORKSPACE/exports/*.csv lastfm-parser/
          git add lastfm-parser/*.csv
          git commit -m "📊 Auto-generated Last.fm CSVs $(date +%Y-%m-%d\ %H:%M:%S)" || echo "No changes"
          git push
